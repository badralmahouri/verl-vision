# apertus_bbox_grpo.yaml
# Training config for bbox tool use with Apertus model (from checkpoint)

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  # Data paths - will be overridden by command line
  train_files: null
  val_files: null

  # Tokenization settings (must fit within model's max_position_embeddings=8192)
  max_prompt_length: 4096
  max_response_length: 1024

  # Batch settings
  train_batch_size: 16
  val_batch_size: 16

  # Key names in your parquet
  prompt_key: 'prompt'
  response_key: 'answer'
  image_key: images

  # Processing options
  return_raw_chat: True  # Important for multi-turn with images
  filter_overlong_prompts: False
  truncation: 'error'

  # Dataset worker settings
  num_workers: 0
  prefetch_factor: null

actor_rollout_ref:
  hybrid_engine: True

  # Actor config
  actor:
    _target_: verl.workers.config.actor.FSDPActorConfig
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 4
    use_dynamic_bsz: False
    optim:
      lr: 1e-6
    use_kl_loss: True
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    fsdp_config:
      param_offload: True
      optimizer_offload: True
      model_dtype: bfloat16
      use_torch_compile: False

  # Model config — Apertus checkpoint
  model:
    use_remove_padding: True
    enable_gradient_checkpointing: True

  # Rollout config
  rollout:
    name: sglang
    mode: async
    gpu_memory_utilization: 0.85
    n: 4
    log_prob_micro_batch_size_per_gpu: 2
    tensor_model_parallel_size: 1
    engine_kwargs:
      sglang:
        log_level: info
    multi_turn:
      enable: True
      max_assistant_turns: 5
      tool_config_path: null  # Will be set via command line
      format: apertus
    trace:
      backend: null  # Only weave/mlflow supported; text traces use log_val_generations
      token2text: True

  # Reference model config
  ref:
    log_prob_micro_batch_size_per_gpu: 2
    fsdp_config:
      param_offload: True
      model_dtype: bfloat16
      use_torch_compile: False

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: True

trainer:
  critic_warmup: 0
  logger: ["console", "tensorboard"]
  project_name: 'apertus_bbox_training'
  experiment_name: 'apertus_bbox_tool'
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 10
  test_freq: 10
  total_training_steps: 100
  total_epochs: 200
  default_local_dir: null  # Will be set via command line
  log_freq: 1
  val_before_train: True
  log_val_generations: 10  # Log N validation samples as text to TensorBoard

# Reward model config - disabled, using rule-based rewards from bbox tool
reward_model:
  enable: False
  reward_manager: naive
  micro_batch_size_per_gpu: 64

